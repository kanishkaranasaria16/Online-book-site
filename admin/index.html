<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('pattern.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            filter: blur(10px);
            z-index: -1;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            z-index: 1;
            height: 300px;
            width: 300px;
        }

        .avatar {
            width: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .input-container {
            display: flex;
            align-items: center;
            margin: 10px 0;
            background:white;
            padding: 10px;
            border-radius: 5px;
        }

        .input-container i {
            margin-right: 10px;
        }

        input {
            border: none;
            background: none;
            outline: none;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>
    
    <div class="login-container">
        <img src="11zon_cropped.png" class="avatar">
        <h2>LOGIN TO DASHBOARD</h2>
        <form action="login.php" method="POST">
            <div class="input-container">
                <i class="fa fa-envelope"></i>
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="input-container">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" name="login">SIGN-IN</button>
        </form>
    </div>
</body>

</html>
