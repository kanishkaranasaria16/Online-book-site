<html>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <style>
        body {
            font-family: Arial, sans-serif !important;
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f4ece2 !important;
        }

        .navbar {
            background: white;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 25px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            font-family: 'Times New Roman', Times, serif;
        }

        .logo img {
            width: 50px;
            height: auto;
            margin-right: 8px;
        }
        </style>
    </head>
    <body>
        <div class="navbar">
        <div class="logo">
            <img src="11zon_cropped.png" alt="Book Icon" class="book-image"> BOOKVILLA
        </div>
    </body>
</html>
