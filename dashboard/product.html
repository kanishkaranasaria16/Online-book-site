<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <script>
        function addToCart(bookTitle, price) {
            let user_id = 1; // Change this dynamically if needed

            fetch("add_to_cart.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: user_id, book_title: bookTitle, price: price })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    alert("Book added to cart!");
                } else {
                    alert("Error: " + data.message);
                }
            })
            .catch(error => console.error("Error:", error));
        }
    </script>
</head>
<body>
    <h1>Book Store</h1>
    <button onclick="addToCart('Harry Potter', 500)">Add Harry Potter to Cart</button>
    <button onclick="addToCart('Lord of the Rings', 700)">Add Lord of the Rings to Cart</button>
    <a href="cart.html">View Cart</a>
</body>
</html>
