<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            padding-top: 80px;
        }

        .container {
            margin-top: 16% !important;
            max-width: 900px;
            margin: auto;
            display: flex;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }

        .book-image img {
            width: 160px;
            height: auto;
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 5px;
        }

        .details {
            flex: 1;
            padding-left: 20px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .author {
            color: #007bff;
            font-size: 18px;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: #d9534f;
        }

        .original-price {
            text-decoration: line-through;
            color: gray;
            font-size: 16px;
        }

        .discount {
            color: green;
            font-size: 16px;
        }

        .stock {
            margin-top: 10px;
            font-size: 16px;
        }

        .description {
            margin-top: 10px;
            font-size: 16px;
            color: #333;
        }

        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            width: 200px;
        }

        .add-to-cart {
            background-color: #d9534f;
            color: white;
        }

        .buy-now {
            background-color: white;
            color: #d9534f;
            border: 2px solid #d9534f;
        }

        .quantity {
            margin-top: 10px;
            display: flex;
            align-items: center;
        }

        .quantity button {
            padding: 5px 10px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }

        .quantity input {
            width: 40px;
            text-align: center;
            border: 1px solid #ccc;
        }

        .back-button {
            position: absolute;
            top: 100px;
            left: 20px;
            font-size: 16px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5% !important;
        }

        .back-button i {
            font-size: 18px;
        }

        .rating {
            font-size: 20px;
            color: #f5c518;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="container">
        <div class="book-image">
            <img id="bookImage" src="" alt="Book Image">
        </div>
        <div class="details">
            <h1 class="title" id="title"></h1>
            <p class="author" id="author"></p>

            <p class="price">₹<span id="price"></span> <span class="original-price">₹<span
                        id="originalPrice"></span></span> <span class="discount">(<span id="discount"></span>%
                    OFF)</span></p>
            <p class="stock" id="stock"></p>
            <p class="rating" id="rating"></p>
            <div class="quantity">
                <button onclick="changeQuantity(-1)">-</button>
                <input type="text" id="quantity" value="1" readonly>
                <button onclick="changeQuantity(1)">+</button>
            </div>
            <div class="buttons">
                <button class="btn add-to-cart" onclick="addToCart()">ADD TO CART</button>
                <button class="btn buy-now">BUY NOW</button>
            </div>
            <p class="description" id="description"></p>
        </div>
    </div>
    <div id="footer"></div>
    <script>
        $(document).ready(function () {
            $("#navbar").load("navbar.html");
            $("#footer").load("footer.html");
            let params = new URLSearchParams(window.location.search);
            let bookId = params.get("id");
            if (!bookId) {
                alert("Invalid book ID.");
                window.location.href = "index.html";
                return;
            }

            $.get(`fetch_book_details.php?id=${bookId}`, function (data) {
                let book = JSON.parse(data);
                if (!book) {
                    alert("Book not found.");
                    window.location.href = "index.html";
                    return;
                }

                $("#bookImage").attr("src", book.image_url);
                $("#title").text(book.title);
                $("#author").text("by " + book.author);
                $("#price").text(book.discount_price);
                $("#originalPrice").text(book.original_price);
                $("#discount").text(book.discount_percentage);
                if (book.Stock > 0) {
                    $("#stock").text("In Stock").css("color", "green");
                } else {
                    $("#stock").text("Out of Stock").css("color", "red");
                }
                $("#description").text(book.description);

                let ratingHTML = "";
                let rating = Math.round(book.rating * 2) / 2;
                for (let i = 1; i <= 5; i++) {
                    if (i <= rating) {
                        ratingHTML += '<i class="fas fa-star"></i>';
                    } else if (i - 0.5 === rating) {
                        ratingHTML += '<i class="fas fa-star-half-alt"></i>';
                    } else {
                        ratingHTML += '<i class="far fa-star"></i>';
                    }
                }
                $("#rating").html(ratingHTML);
            });
        });

        function addToCart() {
            let params = new URLSearchParams(window.location.search);
            let bookId = params.get("id");
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            if (!cart.includes(bookId)) {
                cart.push(bookId);
                localStorage.setItem("cart", JSON.stringify(cart));
                alert("Book added to cart!");
            } else {
                alert("Book is already in the cart.");
            }
        }

        function changeQuantity(change) {
            let quantityInput = document.getElementById("quantity");
            let currentQuantity = parseInt(quantityInput.value);
            let newQuantity = currentQuantity + change;
            if (newQuantity >= 1) {
                quantityInput.value = newQuantity;
            }
        }
    </script>
</body>

</html>
