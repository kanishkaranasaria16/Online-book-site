<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 300px;
            margin-top: 160px !important;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            transition: opacity 1s;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-size: 20px;
            z-index: 2;
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }

        .category-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .category-btn {
            display: inline-block;
            text-align: center;
            padding: 10px;
            background: linear-gradient(to right, rgb(109, 203, 253), white);
            border: 2px solid rgb(109, 203, 253);
            color: black;
            cursor: pointer;
            width: 200px;
            height: 60px;
            font-size: 18px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            line-height: 60px;
            transition: 0.3s;
        }

        .category-btn:hover {
            background: rgb(109, 203, 253);
            color: white;
        }


        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .dot {
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background-color: lightgray;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
        }

        .active {
            background-color: red;
        }
    </style>
</head>

<body>

    <div id="navbarContainer"></div>
    <div class="slider">
        <div class="slides">
            <div class="slide"><img src="child.png" alt="Slide 1"></div>
            <div class="slide"><img src="child1.png" alt="Slide 2"></div>
        </div>
        <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="next" onclick="moveSlide(1)">&#10095;</button>
        <div class="pagination">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
    <div class="category-container">
        <div class="category-container">
            <a href="engineering.html?category_id=18" class="category-btn">Picture Books</a>
            <a href="engineering.html?category_id=19" class="category-btn">Young Readers</a>
            <a href="engineering.html?category_id=20" class="category-btn">Comics</a>
            <a href="engineering.html?category_id=21" class="category-btn">Stories</a>
        </div>

    </div>
    <br><br>
    <div id="footerContainer"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let slideIndex = 0;
            const slides = document.querySelector(".slides");
            const dots = document.querySelectorAll(".dot");
            const totalSlides = document.querySelectorAll(".slide").length;

            function moveSlide(n) {
                slideIndex += n;
                if (slideIndex >= totalSlides) slideIndex = 0;
                if (slideIndex < 0) slideIndex = totalSlides - 1;
                slides.style.transform = `translateX(-${slideIndex * 100}%)`;

                dots.forEach(dot => dot.classList.remove("active"));
                dots[slideIndex].classList.add("active");
            }

            setInterval(() => moveSlide(1), 3000);

            fetch("navbar.html")
                .then(response => response.ok ? response.text() : Promise.reject("Error loading navbar"))
                .then(data => document.getElementById("navbarContainer").innerHTML = data)
                .catch(error => console.error(error));

            fetch("bottem.html")
                .then(response => response.ok ? response.text() : Promise.reject("Error loading footer"))
                .then(data => document.getElementById("footerContainer").innerHTML = data)
                .catch(error => console.error(error));
        });

        function redirect(categoryId) {
            window.location.href = `engineering.html?category_id=${categoryId}`;
        }
    </script>

</body>

</html>
